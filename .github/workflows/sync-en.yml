# Keeps en.json in step with the app's English, so it can't silently fall behind again.
#
# The problem this exists for: the app's dictionary (Stredio-Web/src/i18n/{en-base,en}.ts)
# is what users see; en.json is what translators read. Nothing linked them, so shipping a
# feature added strings to the first and not the second — and a translator cannot translate
# a string they were never shown. en.json drifted 95 keys behind before anyone noticed.
#
# This runs on every push here, daily (to catch changes pushed to the APP, which cannot
# trigger this repo), and on demand. It only ADDS missing keys; rewording an existing
# string is an editorial call and is reported, never applied — see sync-en.js.
#
# No secrets: Stredio-Web is public so reading it is a plain HTTP GET, and committing back
# to THIS repo uses the GITHUB_TOKEN every workflow already gets.

name: sync en.json with the app

on:
  push:
    branches: [master]
  schedule:
    - cron: '17 6 * * *'   # daily — the app repo can't notify us, so we poll
  workflow_dispatch:

permissions:
  contents: write          # to commit the regenerated en.json back to this repo

concurrency:
  group: sync-en
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'   # needs global fetch()

      - name: Add any keys the app has that en.json is missing
        run: node sync-en.js

      - name: Validate every language file
        run: node validate.js

      - name: Commit if en.json changed
        run: |
          if git diff --quiet -- en.json; then
            echo "en.json already in sync — nothing to commit."
            exit 0
          fi
          echo "en.json changed:"
          git diff --stat -- en.json
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add en.json
          git commit -m "chore(i18n): sync en.json with the app's English

          Keys the app can request that en.json was missing. Translators cannot
          translate a string they were never shown, so these were rendering in
          English for every language. Generated by sync-en.js; see its header."
          git push
